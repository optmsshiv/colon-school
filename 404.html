<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Colonel's Sainik Vidyalaya</title>
<link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0f2057;--navy-mid:#1a3580;--gold:#b8860b;--gold-mid:#d4a017;--gold-light:#fdf0c0;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:linear-gradient(150deg,#eef2ff 0%,#fdfcfa 60%,#fffcf0 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .wrap{max-width:520px;}
  .emblem{width:80px;height:80px;background:linear-gradient(135deg,var(--navy),var(--navy-mid));border-radius:20px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--gold-mid);margin:0 auto 28px;box-shadow:0 8px 32px rgba(15,32,87,0.2);}
  .code{font-family:'Cinzel',serif;font-size:96px;font-weight:700;color:var(--navy);line-height:1;margin-bottom:8px;background:linear-gradient(135deg,var(--navy),var(--navy-mid));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  h1{font-family:'Cinzel',serif;font-size:22px;color:var(--navy);margin-bottom:12px;}
  p{font-size:15px;color:#44475a;line-height:1.7;margin-bottom:32px;}
  .btn{display:inline-block;padding:12px 32px;background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:#fff;font-size:14px;font-weight:600;border-radius:10px;text-decoration:none;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 18px rgba(15,32,87,0.25);}
  .btn:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(15,32,87,0.3);}
  .tag{display:inline-block;background:var(--gold-light);border:1px solid rgba(184,134,11,0.2);color:var(--gold);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 14px;border-radius:100px;margin-bottom:20px;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="emblem">CSV</div>
    <div class="tag">Error 404</div>
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or may have been moved. Let's get you back to Colonel's Sainik Vidyalaya.</p>
    <a href="/" class="btn">← Back to Home</a>
  </div>
</body>
</html>
